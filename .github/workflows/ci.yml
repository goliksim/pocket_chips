name: CI

on:
  pull_request:

jobs:
  test:
    name: Tests (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Setup Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install --local
          git lfs pull

      

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs



      - name: Build debug APK
        run: flutter build apk --debug

      - name: Asset test
        run: |
          # хэш исходного файла
          python3 - <<'PY'
          import hashlib, pathlib
          p = pathlib.Path("assets/init_logo.png")
          print(hashlib.sha256(p.read_bytes()).hexdigest())
          PY
          # хэш файла внутри APK
          unzip -l build/app/outputs/flutter-apk/app-debug.apk | grep -E 'init_logo\.png'
          unzip -p build/app/outputs/flutter-apk/app-debug.apk assets/flutter_assets/assets/init_logo.png | shasum -a 256


      - name: Build debug APK
        run: flutter build apk --debug

      - name: Verify bundled asset
        run: |
          unzip -p build/app/outputs/flutter-apk/app-debug.apk assets/flutter_assets/assets/init_logo.png | xxd -l 8
          unzip -p build/app/outputs/flutter-apk/app-debug.apk assets/flutter_assets/assets/init_logo.png | python3 - <<'PY'
          import sys,hashlib
          data=sys.stdin.buffer.read()
          print("apk sha256", hashlib.sha256(data).hexdigest())
          PY

      - name: Verify repo asset
        run: |
          python3 - <<'PY'
          import hashlib
          data=open("assets/init_logo.png","rb").read()
          print("repo sha256", hashlib.sha256(data).hexdigest())
          PY

      - name: Unit Tests
        run: flutter test

      - name: Prepare Patrol CLI
        run: |
          dart pub global activate patrol_cli 3.11.0
          export PATH="$PATH:$HOME/.pub-cache/bin"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Download test-butler
        run: |
          curl -L -o /tmp/test-butler.apk "https://linkedin.jfrog.io/artifactory/open-source/com/linkedin/testbutler/test-butler-app-physical-devices/2.1.1/test-butler-app-physical-devices-2.1.1.apk"

      - name: Integration Tests (Android Emulator - Patrol)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-boot-anim -no-audio -no-snapshot-load -gpu swiftshader_indirect -no-metrics -camera-back none -camera-front none
          emulator-boot-timeout: 600
          script: |
            adb wait-for-device
            adb shell getprop sys.boot_completed
            adb install -r /tmp/test-butler.apk
            patrol test --device emulator-5554 --dart-define=FLUTTER_ENABLE_IMPELLER=false

  test-ios:
    name: Tests (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Prepare Patrol CLI
        run: |
          dart pub global activate patrol_cli 3.11.0
          export PATH="$PATH:$HOME/.pub-cache/bin"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"   

      - name: Boot iOS Simulator
        uses: futureware-tech/simulator-action@v3
        with:
          model: "iPhone 16 Pro"
          os: "iOS"
          os_version: "18.5"

      - name: Build app to create config and install pods
        run: flutter build ios --debug --no-codesign

   

      - name: Integration Tests (iOS Simulator - Patrol)
        run: |
          ls -la ios/Flutter/Generated.xcconfig
          cd ios && pod install --repo-update && cd ..
          patrol test --device "iPhone 16 Pro" --ios 18.5
