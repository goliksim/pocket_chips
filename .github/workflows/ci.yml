name: CI

on:
  pull_request:

jobs:
  test:
    name: Tests (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"

      - name: Setup Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install --local
          git lfs pull


      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs



      

  

      - name: Unit Tests
        run: flutter test

      - name: Prepare Patrol CLI
        run: |
          dart pub global activate patrol_cli 3.11.0
          export PATH="$PATH:$HOME/.pub-cache/bin"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Free Disk Space
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android/sdk/system-images || true
          sudo rm -rf /usr/local/lib/android/sdk/emulator || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /opt/hostedtoolcache/node || true
          sudo rm -rf "$HOME/.gradle/caches" || true
          sudo rm -rf "$HOME/.gradle/wrapper" || true
          df -h

      - name: Download test-butler
        run: |
          curl -L -o /tmp/test-butler.apk "https://linkedin.jfrog.io/artifactory/open-source/com/linkedin/testbutler/test-butler-app-physical-devices/2.1.1/test-butler-app-physical-devices-2.1.1.apk"

      - name: Integration Tests (Android Emulator - Patrol)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-boot-anim -no-audio -no-snapshot-load -gpu swiftshader_indirect -no-metrics -camera-back none -camera-front none -partition-size 2048 -accel off
          emulator-boot-timeout: 1200
          script: |
            adb kill-server
            adb wait-for-device
            until adb shell getprop sys.boot_completed | grep -m 1 '1'; do echo "Waiting for emulator to fully boot..."; sleep 5; done
            adb shell getprop sys.boot_completed
            adb install -r /tmp/test-butler.apk
            patrol test --device emulator-5554 --dart-define=FLUTTER_ENABLE_IMPELLER=false

  test-ios:
    name: Tests (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Prepare Patrol CLI
        run: |
          dart pub global activate patrol_cli 3.11.0
          export PATH="$PATH:$HOME/.pub-cache/bin"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"   

      - name: Boot iOS Simulator
        uses: futureware-tech/simulator-action@v3
        with:
          model: "iPhone 16 Pro"
          os: "iOS"
          os_version: "18.5"

      - name: Build app to create config and install pods
        run: flutter build ios --debug --no-codesign

   

      - name: Integration Tests (iOS Simulator - Patrol)
        run: |
          ls -la ios/Flutter/Generated.xcconfig
          cd ios && pod install --repo-update && cd ..
          patrol test --device "iPhone 16 Pro" --ios 18.5
