name: CI

on:
  pull_request:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format Check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-infos .

  test:
    name: Tests (Android)
    runs-on: ubuntu-latest
    needs:
      - analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Unit Tests
        run: flutter test

      - name: Prepare Patrol CLI
        run: |
          dart pub global activate patrol_cli 3.11.0
          export PATH="$PATH:$HOME/.pub-cache/bin"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Integration Tests (Android Emulator - Patrol)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-boot-anim -no-audio -no-snapshot-load -gpu swiftshader_indirect -no-metrics -camera-back none -camera-front none -partition-size 2048 -accel off
          emulator-boot-timeout: 1200
          script: |
            adb kill-server
            adb wait-for-device
            until adb shell getprop sys.boot_completed | grep -m 1 '1'; do echo "Waiting for emulator to fully boot..."; sleep 5; done
            adb shell getprop sys.boot_completed
            patrol test --device emulator-5554 --dart-define=FLUTTER_ENABLE_IMPELLER=false

  test-ios:
    name: Tests (iOS)
    runs-on: macos-latest
    needs:
      - analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Prepare Patrol CLI
        run: |
          dart pub global activate patrol_cli 3.11.0
          export PATH="$PATH:$HOME/.pub-cache/bin"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"   

      - name: Boot iOS Simulator
        uses: futureware-tech/simulator-action@v3
        with:
          model: "iPhone 16 Pro"
          os: "iOS"
          os_version: "18.5"

      - name: Build app to create config and install pods
        run: flutter build ios --debug --no-codesign

      - name: Integration Tests (iOS Simulator - Patrol)
        run: |
          ls -la ios/Flutter/Generated.xcconfig
          cd ios && pod install --repo-update && cd ..
          patrol test --device "iPhone 16 Pro" --ios 18.5

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs:
      - analyze
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure Android Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=app/keystore.jks
          EOF

      - name: Restore google-services.json
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Build AAB (Release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs:
      - analyze
      - test-ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure iOS Signing
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="ci_keychain_password"
          P12_PATH="$RUNNER_TEMP/ios_signing.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$IOS_P12_BASE64" | base64 --decode > "$P12_PATH"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$PROFILE_DIR/$UUID.mobileprovision"

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.goliksim.pocketchips</key>
              <string>$UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA (Release)
        run: flutter build ipa --release --export-options-plist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14
